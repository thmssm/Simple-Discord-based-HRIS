<h2>Absence Log</h2>

<style>
a{color:#58a6ff;text-decoration:none;font-size:13px}
table{width:100%;border-collapse:collapse;margin-top:8px}
th,td{text-align:left;padding:5px 8px;border-bottom:1px solid #21262d;font-size:12px}
th{color:#8b949e;font-size:11px;font-weight:600}
.empty{color:#484f58;padding:8px 0;font-size:13px}
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-sick{background:#d29922;color:#000}
.badge-day_off,.badge-off{background:#da3633;color:#fff}
.badge-paid_leave,.badge-leave{background:#58a6ff;color:#000}
.badge-afk{background:#3fb950;color:#000}
.badge-other{background:#484f58;color:#c9d1d9}
.btn{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.btn.active{background:#1f6feb;border-color:#58a6ff}
input[type=date]{width:auto;padding:6px;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:4px;font-size:13px}
.msg{font-size:10px;color:#484f58;max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pagination{display:flex;gap:4px;margin-top:12px;align-items:center;font-size:11px;color:#8b949e}
.pagination button{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px}
.pagination button.active{background:#1f6feb}
</style>

<div style="margin:12px 0;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
  <button onclick="changeDay(-1)" class="btn" style="padding:6px 10px">&lt;</button>
  <input type="date" id="abs-date">
  <button onclick="changeDay(1)" class="btn" style="padding:6px 10px">&gt;</button>
  <button onclick="goToday()" class="btn">Today</button>
  <button id="btn-all" onclick="toggleShowAll()" class="btn">Show All</button>
</div>

<div class="table-wrap"><div id="absences-list"></div></div>
<div class="pagination" id="pager"></div>
<div id="message-log"></div>

<script>
var API='';
var showAll=false;
var page=0,perPage=50;

function changeDay(offset){
  showAll=false;
  document.getElementById('btn-all').classList.remove('active');
  var el=document.getElementById('abs-date');
  var parts=el.value.split('-');
  var d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  d.setDate(d.getDate()+offset);
  el.value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  page=0;loadAbsences();
}

function goToday(){
  showAll=false;
  document.getElementById('btn-all').classList.remove('active');
  document.getElementById('abs-date').value=new Date().toISOString().split('T')[0];
  page=0;loadAbsences();
}

function toggleShowAll(){
  showAll=!showAll;
  document.getElementById('btn-all').classList.toggle('active',showAll);
  document.getElementById('abs-date').value='';
  page=0;loadAbsences();
}

async function loadAbsences(){
  var dateVal=showAll?'':document.getElementById('abs-date').value;
  var url=API+'/api/absences?page='+page+'&per_page='+perPage+'&_='+Date.now();
  if(dateVal) url+='&date='+dateVal;
  
  var r=await fetch(url,{cache:'no-store'}),d=await r.json();
  
  var items,total;
  if(Array.isArray(d)){items=d;total=d.length}
  else{items=d.items;total=d.total}
  
  var el=document.getElementById('absences-list');
  if(!items.length){el.innerHTML='<div class=empty>No absence records</div>';document.getElementById('pager').innerHTML='';return}
  
  var html='<table><thead><tr><th>Date</th><th>Name</th><th>Type</th><th>Note</th><th>Message</th></tr></thead><tbody>';
  items.forEach(function(a){
    var typeLabel=a.absence_type.replace(/_/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase()});
    var msg=(a.original_message||'');if(!msg)msg='-';
    html+='<tr><td style=font-size:11px;color:#8b949e>'+a.date+'</td><td>'+a.user_name+'</td><td><span class="badge badge-'+a.absence_type+'">'+typeLabel+'</span></td><td>'+a.note.substring(0,60)+'</td><td class=msg title="'+msg.replace(/"/g,'&quot;')+'">'+msg.substring(0,80)+'</td></tr>';
  });
  html+='</tbody></table>';
  el.innerHTML=html;
  
  var totalPages=Math.ceil(total/perPage);
  var phtml='<span>'+total+' records';
  if(totalPages>1){
    phtml+=' | ';
    if(page>0) phtml+='<button onclick="goPage('+(page-1)+')">Prev</button> ';
    for(var i=0;i<totalPages;i++){
      phtml+='<button onclick="goPage('+i+')"'+(i===page?' class=active':'')+'>'+(i+1)+'</button> ';
    }
    if(page<totalPages-1) phtml+='<button onclick="goPage('+(page+1)+')">Next</button>';
  }
  phtml+='</span>';
  document.getElementById('pager').innerHTML=phtml;
  
  loadMessageLog(dateVal);
}

function goPage(p){page=p;loadAbsences()}

async function loadMessageLog(dateVal){
  var url=API+'/api/message-log?_='+Date.now();
  if(dateVal) url+='&date='+dateVal;
  var r=await fetch(url,{cache:'no-store'}),d=await r.json();
  var el=document.getElementById('message-log');
  if(!d.length){el.innerHTML='';return}
  var html='<h2 style="margin-top:20px">Raw Messages (Absensi Channel)</h2><div class="table-wrap"><table><thead><tr><th>Time</th><th>Name</th><th>Message</th><th>Intent</th><th>Parsed</th></tr></thead><tbody>';
  d.forEach(function(m){
  var time=m.created_at?m.created_at.split(' ')[1]?.substring(0,5):'';
  var intent=m.llm_intent||'-';
  var parsed=m.absence_type?m.absence_type+(m.parsed_note?' — '+m.parsed_note:''):'-';
  html+='<tr><td style=font-size:10px;color:#484f58>'+time+'</td><td>'+m.user_name+'</td><td style=font-size:11px>'+m.content.substring(0,100)+'</td><td style=font-size:10px>'+intent+'</td><td style=font-size:10px;color:#8b949e>'+parsed+'</td></tr>';
  });
  html+='</tbody></table></div>';
  el.innerHTML=html;
}

document.getElementById('abs-date').value=new Date().toISOString().split('T')[0];
loadAbsences();
</script>

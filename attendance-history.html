<h2>Attendance History</h2>

<style>
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:5px 8px;border-bottom:1px solid #21262d;font-size:12px}
th{color:#8b949e;font-size:11px;font-weight:600}
.empty{color:#484f58;padding:8px 0;font-size:13px}
.hidden{display:none}
input[type=date]{width:auto;padding:6px;margin-bottom:12px;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:4px;font-size:13px}
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;display:inline-block;min-width:60px;text-align:center}
.badge-present{background:#238636;color:#fff}
.badge-late{background:#d29922;color:#000}
.badge-missing{background:#da3633;color:#fff}
.badge-sick{background:#d29922;color:#000}
.badge-off,.badge-day_off{background:#da3633;color:#fff}
.badge-leave,.badge-paid_leave{background:#58a6ff;color:#000}
.badge-afk{background:#3fb950;color:#000}
.badge-holiday{background:#8b949e;color:#0d1117}
.badge-weekend{background:#30363d;color:#8b949e}
.badge-future{background:#0d1117;border:1px dashed #30363d;color:#484f58}
.member-row{cursor:pointer}
.member-row:hover{background:#161b22}
.session-detail td{background:#161b22;font-size:11px;color:#8b949e;padding:4px 12px}
.absence-note{font-size:10px;color:#d29922}
.stats{display:flex;gap:16px;margin-bottom:12px;font-size:12px;color:#8b949e}
.stat{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:8px 12px;text-align:center;flex:1}
.stat-num{font-size:20px;font-weight:700}
.btn{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
</style>

<div style="margin:12px 0;display:flex;align-items:center;gap:8px">
  <button onclick="changeDay(-1)" class="btn" style="width:auto;padding:6px 10px">&lt;</button>
  <input type="date" id="ah-date">
  <button onclick="changeDay(1)" class="btn" style="width:auto;padding:6px 10px">&gt;</button>
  <button onclick="goToday()" class="btn" style="width:auto">Today</button>
</div>

<div style="background:#161b22;border:1px solid #30363d;border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:11px;color:#8b949e">
  Data paling akurat dilihat setelah jam kerja berakhir (menjelang tengah malam), sebelum tanggal berganti. Jika dilihat lebih awal, sebagian anggota mungkin masih belum hadir atau belum mengisi absensi.
</div>

<div class="stats" id="stats"></div>
<div id="history-list"></div>

<script>
var API='';

function changeDay(offset){
  var el=document.getElementById('ah-date');
  var parts=el.value.split('-');
  var d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  d.setDate(d.getDate()+offset);
  el.value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  window.history.replaceState({},'','/attendance-history');
  loadHistory();
}

function goToday(){
  document.getElementById('ah-date').value=new Date().toISOString().split('T')[0];
  window.history.replaceState({},'','/attendance-history');
  loadHistory();
}

function fmtDateTime(dt){
  try{return new Date(dt+'Z').toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}catch(e){return dt}
}

async function loadHistory(){
  var dateVal=document.getElementById('ah-date').value||new Date().toISOString().split('T')[0];
  var params=new URLSearchParams(window.location.search);
  if(params.get('date')) dateVal=params.get('date');
  document.getElementById('ah-date').value=dateVal;

  var r=await fetch(API+'/api/attendance-history?date='+dateVal+'&_='+Date.now(),{cache:'no-store'}),d=await r.json();
  
  if(d.future){
    document.getElementById('stats').innerHTML='<div class=stat style=flex:1><div class=stat-num style=color:#484f58>—</div>Future</div>';
    document.getElementById('history-list').innerHTML='<div class=empty>This date has not occurred yet — no attendance data available.</div>';
    return;
  }

  var counts={present:0,late:0,missing:0,weekend:0,holiday:0,other:0};
  d.forEach(function(u){if(counts[u.status]!==undefined)counts[u.status]++;else counts.other++});
  document.getElementById('stats').innerHTML=
    '<div class=stat><div class=stat-num style=color:#238636>'+counts.present+'</div>Present</div>'+
    '<div class=stat><div class=stat-num style=color:#d29922>'+counts.late+'</div>Late</div>'+
    '<div class=stat><div class=stat-num style=color:#da3633>'+counts.missing+'</div>Missing</div>'+
    '<div class=stat><div class=stat-num style=color:#30363d>'+counts.weekend+'</div>Weekend</div>'+
    '<div class=stat><div class=stat-num style=color:#8b949e>'+counts.holiday+'</div>Holiday</div>'+
    '<div class=stat><div class=stat-num style=color:#8b949e>'+counts.other+'</div>Absent</div>';

  var el=document.getElementById('history-list');
  if(!d.length){el.innerHTML='<div class=empty>No members</div>';return}

  var html='<table><thead><tr><th>Name</th><th>Status</th><th>First Join</th><th>Voice Time</th><th></th></tr></thead><tbody>';
  d.forEach(function(u){
    var badgeClass='badge-'+u.status;
    if(u.status==='off'||u.status==='day_off')badgeClass='badge-off';
    if(u.status==='sick')badgeClass='badge-sick';
    if(u.status==='leave'||u.status==='paid_leave')badgeClass='badge-leave';
    if(u.status==='afk')badgeClass='badge-afk';
    if(u.status==='holiday')badgeClass='badge-holiday';
    if(u.status==='weekend')badgeClass='badge-weekend';
    if(u.status==='future')badgeClass='badge-future';

    var fj=u.first_join?fmtDateTime(u.first_join):'-';
    var detailId='det-'+u.user_id.replace(/[^a-zA-Z0-9]/g,'');
    var note=u.absence?' <span class=absence-note>('+u.absence.note.substring(0,50)+')</span>':'';
    var sessions=u.sessions.length?u.sessions.length+' sessions':'';

    html+='<tr class=member-row data-detail='+detailId+'><td>'+u.user_name+note+'</td><td><span class="badge '+badgeClass+'">'+u.status_label+'</span></td><td style=color:#8b949e>'+fj+'</td><td style=color:#8b949e>'+(u.total_minutes||0)+' min</td><td style=color:#484f58;font-size:10px>'+sessions+'</td></tr>';

    if(u.sessions.length){
      html+='<tr class="session-detail hidden" id='+detailId+'><td colspan=5>';
      u.sessions.forEach(function(s){
        var jt=fmtDateTime(s.join_time);
        var lt=s.leave_time?fmtDateTime(s.leave_time):'active';
        var dur=s.duration_minutes?s.duration_minutes+' min':(s.active?'ongoing':'-');
        html+='<div style="padding:2px 0">'+s.channel_name+' | '+jt+' - '+lt+' | '+dur+'</div>';
      });
      html+='</td></tr>';
    }
  });
  html+='</tbody></table>';
  el.innerHTML=html;

  document.querySelectorAll('.member-row').forEach(function(row){
    row.addEventListener('click',function(){
      var detailId=this.dataset.detail;
      var detail=document.getElementById(detailId);
      if(detail) detail.classList.toggle('hidden');
    });
  });
}

document.getElementById('ah-date').addEventListener('change',loadHistory);
document.getElementById('ah-date').value=new Date().toISOString().split('T')[0];
loadHistory();
</script>

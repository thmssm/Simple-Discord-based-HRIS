<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — HR Dashboard</title>
<!-- Turnstile script — uncomment and set YOUR_TURNSTILE_SITE_KEY above when ready -->
<!--<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileReady" async defer></script>-->
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#c9d1d9;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:32px;width:100%;max-width:360px}
h1{font-size:20px;color:#e6edf3;margin-bottom:4px;text-align:center}
.sub{font-size:12px;color:#8b949e;text-align:center;margin-bottom:20px}
label{display:block;font-size:12px;color:#8b949e;margin-bottom:4px;margin-top:12px}
input{width:100%;padding:8px;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:4px;font-size:14px}
input:focus{outline:none;border-color:#58a6ff}
button{width:100%;margin-top:16px;padding:10px;background:#238636;border:1px solid #2ea043;color:#fff;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600}
button:hover{background:#2ea043}
button:disabled{background:#30363d;border-color:#484f58;color:#8b949e;cursor:not-allowed}
.error{color:#da3633;font-size:12px;margin-top:8px;text-align:center}
</style>
</head>
<body>
<div class="login-box">
  <h1>HR Dashboard</h1>
  <div class="sub">Authorized personnel only</div>
  <form method="POST" action="/api/login">
    <label>Username</label>
    <input type="text" name="username" autocomplete="username" required>
    <label>Password</label>
    <input type="password" name="password" autocomplete="current-password" required>
    <div class="cf-turnstile" data-sitekey="YOUR_TURNSTILE_SITE_KEY" data-callback="onTurnstileSuccess" data-expired-callback="onTurnstileExpired" data-theme="dark" style="margin-top:16px"></div>
    <button type="submit" id="login-btn" disabled>Sign in</button>
  </form>
  <div class="error" id="error"></div>
</div>
<script>
// Enable button when Turnstile challenge is completed
function onTurnstileSuccess(token) {
  document.getElementById("login-btn").disabled = false;
}
// Re-disable button if token expires
function onTurnstileExpired() {
  document.getElementById("login-btn").disabled = true;
}
// Fallback: if Turnstile fails to load, enable after 10s
setTimeout(function() {
  var btn = document.getElementById("login-btn");
  if (btn.disabled) {
    btn.disabled = false;
  }
}, 10000);

var params = new URLSearchParams(window.location.search);
if (params.get("error")) {
  var msg = params.get("error");
  var map = {"1": "Invalid credentials", "2": "Verification failed. Please try again."};
  document.getElementById("error").textContent = map[msg] || "Login failed";
}
</script>
</body>
</html>
